<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-indigo-100 to-purple-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl p-8 border border-gray-200">

    <!-- Title -->
    <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-indigo-700">Admin Login</h2>
        <p class="text-gray-500 text-sm mt-1">Sign in to view notices</p>
    </div>

    <!-- Form -->
    <form>

        <!-- Email -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Email Address
            </label>

            <input type="email"
            placeholder="Enter your email"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Password
            </label>

            <input type="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
        </div>

        <!-- Remember -->
        <div class="flex justify-between items-center mb-5 text-sm">
            <label class="flex items-center gap-2 text-gray-600">
                <input type="checkbox" class="accent-indigo-600">
                Remember me
            </label>

            <a href="#" class="text-indigo-600 hover:underline font-medium">
                Forgot Password?
            </a>
        </div>

        <!-- Button -->
        <button
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-300 shadow-md hover:shadow-lg">
            Login
        </button>

    </form>

</div>

</body>
</html>
