{% extends 'side.html' %}

{% block content %}


<!-- Background Design -->
<div class="fixed top-0 left-0 w-full h-64 bg-indigo-600 -z-10 rounded-b-[3rem] opacity-20"></div>
<div class="fixed top-[-10%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full blur-[120px] opacity-30 -z-10"></div>

<div class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl p-10 border border-slate-100">

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-800">
        Student <span class="text-indigo-600">Registration</span>
      </h2>
      <p class="text-slate-500 mt-2 text-sm">
        Create your account to access the student portal
      </p>
    </div>

    <!-- Form -->
    <form method="POST" action="register" class="space-y-6">

      <!-- Name -->
      <div>
        <label class="text-sm font-semibold text-slate-600">Full Name</label>
        <input name="fn" type="text" placeholder="Enter your name"
          class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Email -->
      <div>
        <label class="text-sm font-semibold text-slate-600">Email Address</label>
        <input name="em" type="email" placeholder="Enter your email"
          class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Course -->
      <div>
        <label class="text-sm font-semibold text-slate-600">Course</label>
        <select name="cs" class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
          <option>Select Course</option>
          <!-- Development / Tech Courses -->
          <option>Web Development</option>
          <option>AI & Machine Learning</option>
          <option>Digital Marketing</option>
          <option>Data Science</option>
          <option>App Development</option>

          <!-- Office / Accounting Courses -->
          <option>Office Automation</option>
          <option>Autodesk</option>
          <option>Accounting</option>
        </select>
      </div>

      <!-- Password -->
      <div class="grid md:grid-cols-2 gap-4">

        <div>
          <label class="text-sm font-semibold text-slate-600">Password</label>
          <input name="pw" type="password" placeholder="Enter password"
            class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-semibold text-slate-600">Confirm Password</label>
          <input name="pw1" type="password" placeholder="Confirm password"
            class="w-full mt-2 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

      </div>

      <!-- Button -->
      <button type="submit"
        class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
        Register Now
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a href="#" class="text-indigo-600 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

</div>


{% endblock %}
