{% extends 'side.html' %}

{% block content %}
<div class="bg-white shadow-xl rounded-2xl p-8">

    <h2 class="text-2xl font-bold text-center mb-2">
        Create Student <span class="text-indigo-600">Notice</span>
    </h2>

    <p class="text-center text-gray-500 mb-8">
        Fill in the details to publish a new announcement
    </p>

    <form method="POST" action="notice" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Notice Title
        </label>
        <input type="text" name="ti" required
            placeholder="e.g. Mid-term Exam Schedule"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Expiry Date
        </label>
        <input type="date" name="ed" required
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Description
        </label>
        <textarea rows="5" name="ds" required
            placeholder="Briefly describe the notice content..."
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
            Upload Notice PDF
        </label>
        <input type="file" name="notes" accept="application/pdf"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-gray-50 cursor-pointer">
    </div>

    <button type="submit"
        class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-3 rounded-xl font-semibold shadow-lg hover:scale-105 transition">
        🚀 Publish Notice
    </button>
</form>

</div>
{% endblock %}
