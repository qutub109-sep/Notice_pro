<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-100 flex min-h-screen overflow-x-hidden">

    <!-- Overlay (Mobile) -->
    <div id="overlay" onclick="toggleSidebar()"
        class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 md:hidden"></div>

    <!-- Sidebar -->
    <div id="sidebar"
        class="fixed md:static z-50 w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white flex flex-col shadow-2xl transition-all duration-300 transform -translate-x-full md:translate-x-0">

        <!-- Header -->
        <div class="relative py-6 px-4 border-b border-gray-700">

            <h1 class="text-xl font-bold tracking-wide">
                🎓 Student Portal
            </h1>

            <!-- Close Button (Mobile only) -->
            <button onclick="toggleSidebar()"
                class="absolute top-4 right-4 text-white text-xl hover:text-red-400 md:hidden">
                ✖
            </button>

        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-2 text-sm">

            <a href="/Dashboard" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 hover:pl-6 transition-all border-l-4 border-transparent hover:border-blue-400">
                📊 Dashboard
            </a>

            <a href="/notice" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 hover:pl-6 transition-all border-l-4 border-transparent hover:border-yellow-400">
                📢 Add Notice
            </a>

            <a href="/student" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 hover:pl-6 transition-all border-l-4 border-transparent hover:border-green-400">
                👨‍🎓 Students
            </a>

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 hover:pl-6 transition-all border-l-4 border-transparent hover:border-purple-400">
                📅 Schedule
            </a>

            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 hover:pl-6 transition-all border-l-4 border-transparent hover:border-pink-400">
                ⚙️ Settings
            </a>

        </nav>

        <!-- Footer -->
        <div class="p-4 border-t border-gray-700">
            <a href="/Login">
                <button class="w-full bg-red-500 hover:bg-red-600 py-2 rounded-lg font-semibold transition shadow-md hover:shadow-lg">
                    Admin Login
                </button>
            </a>
        </div>

    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- Top Bar -->
        <div class="p-6 w-full flex items-center">

            <!-- Toggle Button (Mobile only) -->
            <button onclick="toggleSidebar()"
                class="text-2xl bg-gray-800 text-white px-4 py-2 rounded-xl shadow-lg hover:bg-gray-700 transition-all active:scale-95 md:hidden">
                ☰
            </button>

        </div>

        <!-- Page Content -->
        <main class="flex-1 flex justify-center items-start p-6 overflow-y-auto w-full">
            <div class="w-full max-w-4xl">
                {% block content %}
                {% endblock %}
            </div>
        </main>

    </div>

    <!-- Script -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");

            if (sidebar.classList.contains("-translate-x-full")) {
                sidebar.classList.remove("-translate-x-full");
                overlay.classList.remove("hidden");
            } else {
                sidebar.classList.add("-translate-x-full");
                overlay.classList.add("hidden");
            }
        }
    </script>

</body>
</html>
