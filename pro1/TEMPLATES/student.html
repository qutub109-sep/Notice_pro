<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Container -->
  <div class="bg-white shadow-xl rounded-2xl flex w-[900px] overflow-hidden">

    <!-- Left Side (Branding) -->
    <div class="w-1/2 bg-indigo-600 text-white flex flex-col justify-center items-center p-10">
      <h1 class="text-4xl font-bold mb-4">Welcome Back 👋</h1>
      <p class="text-center text-indigo-100">
        Login to access your student dashboard and notices.
      </p>
    </div>

    <!-- Right Side (Login Form) -->
    <div class="w-1/2 p-10">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">
        Student Login
      </h2>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Email</label>
        <input type="email" placeholder="Enter your email"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Password</label>
        <input type="password" placeholder="Enter your password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>

      <!-- Remember + Forgot -->
      <div class="flex justify-between items-center mb-6 text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="mr-2">
          Remember me
        </label>
        <a href="#" class="text-indigo-600 hover:underline">Forgot Password?</a>
      </div>

      <!-- Button -->
      <button
        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition duration-300">
        Login
      </button>

      <!-- Footer -->
      <p class="text-sm text-gray-500 text-center mt-6">
        © 2026 Student Portal
      </p>
    </div>

  </div>

</body>
</html>
